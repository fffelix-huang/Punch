name: Run Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v3
      - uses: pre-commit/action@v3.0.1

  unit-test:
    name: Run Tests (Ubuntu, ${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc'}}
      CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++'}}
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build
      - name: Build
        run: make
      - name: Run All Tests
        run: make test
      - name: Bench Test
        run: ./punch bench
